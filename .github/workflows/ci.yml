name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Build plugin jar
        run: ./gradlew shadowJar

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spawnersilk-artifacts
          path: |
            spawnersilk-core/build/libs/*.jar
            spawnersilk-core/build/reports/tests/test/*
